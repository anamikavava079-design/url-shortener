<!DOCTYPE html>
<html>
<head><title>URL Shortener</title></head>
<body>
    <h1>URL Shortener</h1>
    <form method="POST">
        <input type="url" name="url" placeholder="Paste long URL here" required style="width:400px">
        <button type="submit">Shorten</button>
    </form>
    {% if short_url %}
        <p>Your short URL: <a href="{{ short_url }}">{{ short_url }}</a></p>
    {% endif %}
    <br>
    <a href="/analytics">View Analytics</a>
</body>
</html>
