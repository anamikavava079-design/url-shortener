<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 500px; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }
        input[type="url"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
        input[type="url"]:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; }
        .result a { color: #27ae60; font-weight: bold; word-break: break-all; }
        .analytics-link { display: block; text-align: center; margin-top: 20px; color: #3498db; text-decoration: none; }
        .analytics-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>
        <p>Paste a long URL and get a short one instantly</p>
        <form method="POST">
            <input type="url" name="url" placeholder="https://example.com/very/long/url" required>
            <button type="submit">Shorten URL</button>
        </form>
        {% if short_url %}
        <div class="result">
            ✅ Your short URL: <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
        </div>
        {% endif %}
        <a href="/analytics" class="analytics-link">📊 View Analytics Dashboard →</a>
    </div>
</body>
</html>
